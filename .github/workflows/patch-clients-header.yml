name: Patch clients header

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Remove redundant CRM presentation
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/components/admin/CustomerDirectoryPanel.tsx')
          text = path.read_text()
          old = '''      <section className="rounded-3xl border border-caramel/15 bg-white p-4 shadow-sm">
        <div className="flex flex-col gap-3 xl:flex-row xl:items-center xl:justify-between">
          <div><p className="text-xs font-black uppercase tracking-[0.16em] text-caramel">CRM Clients</p><h2 className="font-display text-2xl font-black text-espresso">Toutes les données clients, une seule fiche</h2><p className="mt-1 text-sm text-muted-foreground">{meta?.rawRecords || 0} enregistrements analysés · {customers.length} personnes uniques · tri alphabétique A → Z.</p></div>
          <div className="flex flex-wrap gap-2"><Button variant="outline" onClick={loadCustomers}><RefreshCw className="mr-2 h-4 w-4" />Actualiser</Button><Button variant="outline" onClick={exportCsv} disabled={!filtered.length}><FileSpreadsheet className="mr-2 h-4 w-4" />Excel / CSV</Button><Button className="bg-espresso text-white" onClick={printReport} disabled={!filtered.length}><Printer className="mr-2 h-4 w-4" />PDF premium</Button></div>
        </div>
        <div className="mt-4 flex flex-col gap-3 xl:flex-row"><div className="relative flex-1"><Search className="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-muted-foreground" /><Input value={query} onChange={(event) => setQuery(event.target.value)} placeholder="Rechercher nom, e-mail, téléphone, ville ou source…" className="h-12 rounded-2xl pl-10" /></div><div className="flex flex-wrap gap-2">{([['all','Tous'],['recent','Nouveaux'],['vip','VIP'],['reward','Gain actif'],['inactive','Inactifs'],['consent','RGPD OK']] as const).map(([value,label]) => <button key={value} onClick={() => setFilter(value)} className={`rounded-2xl px-4 py-2 text-xs font-black ${filter === value ? 'bg-caramel text-white' : 'bg-muted text-muted-foreground'}`}>{label}</button>)}</div></div>
      </section>'''
          new = '''      <section className="flex flex-col gap-3 rounded-2xl border border-caramel/15 bg-white p-3 shadow-sm xl:flex-row xl:items-center">
        <div className="relative flex-1"><Search className="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-muted-foreground" /><Input value={query} onChange={(event) => setQuery(event.target.value)} placeholder="Rechercher nom, e-mail, téléphone, ville ou source…" className="h-11 rounded-xl pl-10" /></div>
        <div className="flex flex-wrap gap-2">{([['all','Tous'],['recent','Nouveaux'],['vip','VIP'],['reward','Gain actif'],['inactive','Inactifs'],['consent','RGPD OK']] as const).map(([value,label]) => <button key={value} onClick={() => setFilter(value)} className={`rounded-xl px-3 py-2 text-xs font-black ${filter === value ? 'bg-caramel text-white' : 'bg-muted text-muted-foreground'}`}>{label}</button>)}</div>
        <div className="flex flex-wrap gap-2"><Button size="sm" variant="outline" onClick={loadCustomers}><RefreshCw className="mr-2 h-4 w-4" />Actualiser</Button><Button size="sm" variant="outline" onClick={exportCsv} disabled={!filtered.length}><FileSpreadsheet className="mr-2 h-4 w-4" />CSV</Button><Button size="sm" className="bg-espresso text-white" onClick={printReport} disabled={!filtered.length}><Printer className="mr-2 h-4 w-4" />PDF</Button></div>
      </section>'''
          if old not in text:
              raise SystemExit('Target block not found')
          path.write_text(text.replace(old, new, 1))
          PY
          rm .github/workflows/patch-clients-header.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/admin/CustomerDirectoryPanel.tsx .github/workflows/patch-clients-header.yml
          git commit -m "fix(admin clients): retirer le bloc de présentation inutile"
          git push origin HEAD:main
