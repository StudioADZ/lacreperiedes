name: Finalize Admin Tab Labels

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/rename-admin-tabs-once.yml'

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rename admin tabs
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/pages/Admin.tsx')
          text = path.read_text()
          text = text.replace('{ id: "actus", label: "Actus & réseaux", description: "Publications", icon: Newspaper }', '{ id: "actus", label: "Publications", description: "Réseaux sociaux", icon: Newspaper }')
          text = text.replace('{ id: "payment", label: "Paiement", description: "Réglages paiement", icon: CreditCard }', '{ id: "payment", label: "Commandes & paiements", description: "Click & collect", icon: CreditCard }')
          path.write_text(text)
          PY
          git rm .github/workflows/rename-admin-tabs-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/Admin.tsx
          git commit -m "fix: rename Publications and Orders tabs"
          git push
