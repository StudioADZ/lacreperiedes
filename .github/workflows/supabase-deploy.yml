name: Deploy Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy database migrations and functions
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check required secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Missing SUPABASE_ACCESS_TOKEN" && exit 1)
          test -n "$SUPABASE_PROJECT_ID" || (echo "Missing SUPABASE_PROJECT_ID" && exit 1)
          test -n "$SUPABASE_DB_PASSWORD" || (echo "Missing SUPABASE_DB_PASSWORD" && exit 1)
          echo "Secrets are present. Project ref: $SUPABASE_PROJECT_ID"

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Repair reverted migrations
        run: |
          supabase migration repair --status reverted 20260210231408 -p "$SUPABASE_DB_PASSWORD"
          supabase migration repair --status reverted 20260221194000 -p "$SUPABASE_DB_PASSWORD"

      - name: Repair applied migrations
        run: |
          for migration in \
            20260112002548 20260112002705 20260112004500 20260112005000 \
            20260112011451 20260112013000 20260112014000 20260112021334 \
            20260112025659 20260112071018 20260112151421 20260112153815 \
            20260112173542 20260112174050 20260112174328 20260112175754 \
            20260112222334 20260113205308 20260114013102 20260114013135 \
            20260115004000 20260116010444 20260120004418 20260120004455 \
            20260120215123 20260120231408 20260120234055 20260208162852 \
            20260208164724 20260211141624 20260214160000 20260220074350 \
            20260221194400 20260430082516
          do
            supabase migration repair --status applied "$migration" -p "$SUPABASE_DB_PASSWORD"
          done

      - name: Push pending database migrations
        run: supabase db push -p "$SUPABASE_DB_PASSWORD"

      - name: Deploy quiz-session
        run: supabase functions deploy quiz-session --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy quiz-submit
        run: supabase functions deploy quiz-submit --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy verify-prize
        run: supabase functions deploy verify-prize --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy send-prize-email
        run: supabase functions deploy send-prize-email --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy admin-scan
        run: supabase functions deploy admin-scan --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy admin-social-posts
        run: supabase functions deploy admin-social-posts --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy weekly-health-check
        run: supabase functions deploy weekly-health-check --project-ref "$SUPABASE_PROJECT_ID"
