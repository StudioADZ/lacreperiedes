name: Deploy Admin Orders

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/admin-orders/**'
      - 'supabase/migrations/*click_collect_orders.sql'
      - '.github/workflows/admin-orders-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
      - run: supabase db push -p "$SUPABASE_DB_PASSWORD"
      - run: supabase functions deploy admin-orders --project-ref "$SUPABASE_PROJECT_ID"
